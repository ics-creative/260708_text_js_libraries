<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>3. Torphのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .morph-panel {
      display: grid;
      gap: 18px;
      padding: 22px;
      overflow: hidden;
      background: var(--soft);
    }

    .morph-title {
      display: grid;
      place-items: center;
      min-height: 140px;
      font-size: 3rem;
      line-height: 1.05;
    }

    .morph-word,
    .number-text {
      width: fit-content;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 900;
    }

    .morph-word {
      color: var(--primary);
    }

    .number-stage {
      display: grid;
      place-items: center;
      min-height: 118px;
      padding: 18px;
      overflow: hidden;
      border-radius: 8px;
      background: var(--deep);
    }

    .number-field {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: min(100%, 318px);
      min-height: 88px;
      padding: 16px 20px 18px;
      color: #ffffff;
      border-radius: 36px 36px 0 0;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.22);
    }

    .number-text {
      min-width: 0;
      overflow: hidden;
      font-size: 3.15rem;
      line-height: 1;
      text-overflow: ellipsis;
    }

    .number-cursor {
      flex: 0 0 auto;
      width: 3px;
      height: 1em;
      margin: 0 0 0 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      animation: blink 1s steps(2, start) infinite;
    }

    .word-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .mini-button.is-current {
      background: var(--deep);
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 560px) {
      .morph-title {
        min-height: 116px;
        font-size: 2.3rem;
      }

      .number-stage {
        min-height: 104px;
      }

      .number-field {
        min-height: 78px;
      }

      .number-text {
        font-size: 2.45rem;
      }
    }
  </style>
</head>

<body>
<main class="wrapper">
  <section class="panel morph-panel">
    <h2 class="morph-title">
      <span class="morph-word js-morph-word">Draft</span>
    </h2>

    <div class="number-stage">
      <div class="number-field">
        <span class="number-text js-number-label">2</span>
        <span class="number-cursor"></span>
      </div>
    </div>

    <div class="word-buttons">
      <button class="mini-button js-word-button is-current" data-number="2" data-word="Draft" type="button">Draft</button>
      <button class="mini-button js-word-button" data-number="20" data-word="Proof" type="button">Proof</button>
      <button class="mini-button js-word-button" data-number="20." data-word="Tune" type="button">Tune</button>
      <button class="mini-button js-word-button" data-number="20.8" data-word="Publish" type="button">Publish</button>
    </div>
  </section>
</main>

<script type="module">
  import { TextMorph } from "https://esm.sh/torph@0.0.9";

  const wordElement = document.querySelector(".js-morph-word");
  const numberElement = document.querySelector(".js-number-label");
  const buttons = [...document.querySelectorAll(".js-word-button")];

  const wordMorph = new TextMorph({
    element: wordElement,
    duration: 460,
    ease: "cubic-bezier(0.19, 1, 0.22, 1)",
    locale: "en",
  });

  const numberMorph = new TextMorph({
    element: numberElement,
    duration: 360,
    ease: "cubic-bezier(0.19, 1, 0.22, 1)",
    locale: "ja",
  });

  let wordIndex = 0;

  function updateDemo(nextIndex) {
    wordIndex = nextIndex;
    const button = buttons[wordIndex];

    // 現在の語だけを強調し、どの言葉へ変化したかを見失わないようにする
    buttons.forEach((item, index) => {
      item.classList.toggle("is-current", index === wordIndex);
    });

    // 見出しの語と数値入力風の表示を同じタイミングで切り替える
    wordMorph.update(button.dataset.word);
    numberMorph.update(button.dataset.number);
  }

  buttons.forEach((button, index) => {
    button.addEventListener("click", () => {
      updateDemo(index);
    });
  });

  updateDemo(0);
</script>
</body>
</html>
