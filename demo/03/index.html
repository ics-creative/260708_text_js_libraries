<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>3. Torphのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .morph-panel {
      display: grid;
      gap: 18px;
      padding: 22px;
      overflow: hidden;
    }

    .morph-title {
      display: grid;
      place-items: center;
      min-height: 140px;
      font-size: 48px;
      line-height: 1.05;

      @media (width <= 560px) {
        min-height: 116px;
        font-size: 38px;
      }
    }

    .morph-word,
    .number-text {
      width: fit-content;
      font-weight: bold;
    }

    .morph-word {
      color: var(--primary);
    }

    .number-stage {
      display: grid;
      place-items: center;
      min-height: 118px;
      padding: 18px;
      overflow: hidden;
      border-radius: 8px;
      background: var(--deep);

      @media (width <= 560px) {
        min-height: 104px;
      }
    }

    .number-field {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: min(100%, 318px);
      min-height: 88px;
      padding: 16px 20px 18px;
      color: #ffffff;
      border-radius: 36px 36px 0 0;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.22);
      font-size: 50px;

      @media (width <= 560px) {
        min-height: 78px;
        font-size: 40px;
      }
    }

    .number-text {
      min-width: 0;
      overflow: hidden;
      font-size: inherit;
      line-height: 1;
      text-overflow: ellipsis;
    }

    .number-cursor {
      flex: 0 0 auto;
      width: 0.08em;
      height: 1.15em;
      margin: 0 0 -0.06em 0.16em;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
<main class="wrapper">
  <section class="panel morph-panel">
    <h2 class="morph-title">
      <span class="morph-word mono js-morph-word">Copy</span>
    </h2>

    <div class="number-stage">
      <div class="number-field">
        <span class="number-text mono js-number-label">2</span>
        <span class="number-cursor"></span>
      </div>
    </div>

    <div class="control-row">
      <button class="control-button js-change" type="button">Change</button>
    </div>
  </section>
</main>

<script type="module">
  import { TextMorph } from "https://esm.sh/torph@0.0.9";

  const wordElement = document.querySelector(".js-morph-word");
  const numberElement = document.querySelector(".js-number-label");
  const scenes = [
    { word: "Copy", number: "2" },
    { word: "Copied", number: "20" },
    { word: "コピー中", number: "20." },
    { word: "コピー完了", number: "20.8" },
  ];

  // 対象要素とアニメーション設定を渡してTextMorphを作成する
  const wordMorph = new TextMorph({
    element: wordElement,
    duration: 460,
    ease: "cubic-bezier(0.19, 1, 0.22, 1)",
    locale: "ja",
  });

  const numberMorph = new TextMorph({
    element: numberElement,
    duration: 360,
    ease: "cubic-bezier(0.19, 1, 0.22, 1)",
    locale: "ja",
  });

  let wordIndex = 0;

  function updateDemo(nextIndex) {
    wordIndex = nextIndex;
    const scene = scenes[wordIndex];

    // update()で次の文字列へモーフィングする
    wordMorph.update(scene.word);
    numberMorph.update(scene.number);
  }

  document.querySelector(".js-change").addEventListener("click", () => {
    updateDemo((wordIndex + 1) % scenes.length);
  });

  updateDemo(0);
</script>
</body>
</html>
