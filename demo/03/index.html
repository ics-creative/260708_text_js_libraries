<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>3. Torphのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .morph-panel {
      display: grid;
      gap: 16px;
      padding: 22px;
      overflow: hidden;
      background: var(--soft);
    }

    .morph-title {
      display: grid;
      place-items: center;
      min-height: 140px;
      font-size: 3rem;
      line-height: 1.05;
    }

    .morph-word,
    .typing-text {
      width: fit-content;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 900;
    }

    .morph-word {
      color: var(--primary);
    }

    .typing-stage {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 96px;
      padding: 18px;
      overflow: hidden;
      color: #ffffff;
      background: var(--deep);
    }

    .typing-line {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 460px;
      min-height: 54px;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .prompt-mark {
      flex: 0 0 auto;
      margin-right: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--accent);
    }

    .typing-text {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      font-size: 1.2rem;
      line-height: 1.2;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .typing-cursor {
      flex: 0 0 auto;
      width: 2px;
      height: 1.35em;
      margin-left: 5px;
      background: var(--accent);
      animation: blink 1s steps(2, start) infinite;
    }

    .word-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .mini-button.is-current {
      background: var(--deep);
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 560px) {
      .morph-title {
        min-height: 116px;
        font-size: 2.3rem;
      }

      .typing-line {
        justify-content: flex-start;
      }

      .typing-text {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
<main class="wrapper">
  <section class="panel morph-panel">
    <h2 class="morph-title">
      <span class="morph-word js-morph-word">Draft</span>
    </h2>

    <div class="word-buttons">
      <button class="mini-button js-word-button is-current" data-word="Draft" type="button">Draft</button>
      <button class="mini-button js-word-button" data-word="Proof" type="button">Proof</button>
      <button class="mini-button js-word-button" data-word="Tune" type="button">Tune</button>
      <button class="mini-button js-word-button" data-word="Publish" type="button">Publish</button>
    </div>

    <div class="panel typing-stage">
      <div class="typing-line">
        <span class="prompt-mark">$</span>
        <span class="typing-text js-typing-text">npm i torph</span>
        <span class="typing-cursor"></span>
      </div>
    </div>

    <div class="word-buttons">
      <button class="mini-button js-line-button is-current" data-line="npm i torph" type="button">Install</button>
      <button class="mini-button js-line-button" data-line="Copied to Clipboard" type="button">Copy</button>
      <button class="mini-button js-line-button" data-line="Buy for ¥1,980 / Month" type="button">Price</button>
      <button class="mini-button js-line-button" data-line="Processing Draft" type="button">Status</button>
    </div>
  </section>
</main>

<script type="module">
  import { TextMorph } from "https://esm.sh/torph@0.0.9";

  const wordElement = document.querySelector(".js-morph-word");
  const buttons = [...document.querySelectorAll(".js-word-button")];
  const words = buttons.map((button) => button.dataset.word);
  const lineElement = document.querySelector(".js-typing-text");
  const lineButtons = [...document.querySelectorAll(".js-line-button")];
  const lines = lineButtons.map((button) => button.dataset.line);

  const morph = new TextMorph({
    element: wordElement,
    duration: 460,
    ease: "cubic-bezier(0.19, 1, 0.22, 1)",
    locale: "en",
  });
  const lineMorph = new TextMorph({
    element: lineElement,
    duration: 520,
    ease: "cubic-bezier(0.19, 1, 0.22, 1)",
    locale: "en",
    scale: false,
  });

  let wordIndex = 0;
  let lineIndex = 0;

  function updateWord(nextIndex) {
    wordIndex = nextIndex;

    // 現在の語だけを強調し、どの言葉へ変化したかを見失わないようにする
    buttons.forEach((button, index) => {
      button.classList.toggle("is-current", index === wordIndex);
    });

    morph.update(words[wordIndex]);
  }

  function updateLine(nextIndex) {
    lineIndex = nextIndex;

    // 入力カーソルの前に置いたテキストだけを差し替え、カーソルが追いかける見え方にする
    lineButtons.forEach((button, index) => {
      button.classList.toggle("is-current", index === lineIndex);
    });

    lineMorph.update(lines[lineIndex]);
  }

  buttons.forEach((button, index) => {
    button.addEventListener("click", () => {
      updateWord(index);
    });
  });

  lineButtons.forEach((button, index) => {
    button.addEventListener("click", () => {
      updateLine(index);
    });
  });

  updateWord(0);
  updateLine(0);
</script>
</body>
</html>
