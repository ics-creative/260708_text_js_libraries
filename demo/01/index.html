<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>1. slot-textのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/slot-text@0.3.1/style.css" rel="stylesheet" />
  <style>
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .signal-card {
      display: grid;
      place-items: center;
      min-height: 112px;
      padding: 16px;
    }

    .signal-card:nth-child(1) {
      background: var(--soft-blue);
    }

    .signal-card:nth-child(2) {
      background: var(--soft);
    }

    .signal-card:nth-child(3) {
      background: var(--soft-purple);
    }

    .slot-label {
      min-height: 1.35em;
      font-weight: 800;
      line-height: 1.3;
    }

    .slot-stack {
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    .slot-label-en {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 1.8rem;
    }

    .slot-label-ja {
      font-size: 1.22rem;
      color: var(--primary);
    }

    @media (max-width: 560px) {
      .signal-grid {
        grid-template-columns: 1fr;
      }

      .signal-card {
        min-height: 104px;
      }

      .slot-label-en {
        font-size: 1.65rem;
      }

      .slot-label-ja {
        font-size: 1.14rem;
      }
    }
  </style>
</head>

<body>
<main class="wrapper">
  <section class="signal-grid">
    <div class="panel signal-card">
      <div class="slot-stack">
        <p class="slot-label slot-label-en js-copy-label-en">Copy</p>
        <p class="slot-label slot-label-ja js-copy-label-ja">コピー</p>
      </div>
    </div>

    <div class="panel signal-card">
      <div class="slot-stack">
        <p class="slot-label slot-label-en js-status-label-en">Online</p>
        <p class="slot-label slot-label-ja js-status-label-ja">オンライン</p>
      </div>
    </div>

    <div class="panel signal-card">
      <div class="slot-stack">
        <p class="slot-label slot-label-en js-save-label-en">Saving</p>
        <p class="slot-label slot-label-ja js-save-label-ja">保存中</p>
      </div>
    </div>
  </section>

  <div class="control-row">
    <button class="control-button js-cycle" type="button">Change</button>
  </div>
</main>

<script type="module">
  import { slotText } from "https://esm.sh/slot-text@0.3.1";

  const items = [
    {
      controller: slotText(document.querySelector(".js-copy-label-en"), "Copy"),
      direction: "up",
    },
    {
      controller: slotText(document.querySelector(".js-copy-label-ja"), "コピー"),
      direction: "up",
    },
    {
      controller: slotText(document.querySelector(".js-status-label-en"), "Online"),
      direction: "down",
    },
    {
      controller: slotText(document.querySelector(".js-status-label-ja"), "オンライン"),
      direction: "down",
    },
    {
      controller: slotText(document.querySelector(".js-save-label-en"), "Saving"),
      direction: "up",
    },
    {
      controller: slotText(document.querySelector(".js-save-label-ja"), "保存中"),
      direction: "up",
    },
  ];

  const scenes = [
    ["Copy", "コピー", "Online", "オンライン", "Saving", "保存中"],
    ["Copied", "コピー済み", "Offline", "オフライン", "Done", "完了"],
  ];

  let sceneIndex = 0;

  function rollLabels() {
    sceneIndex = (sceneIndex + 1) % scenes.length;

    // 文字数が少ないUIラベルだけを差し替え、本文の読みやすさは保つ
    items.forEach((item, index) => {
      item.controller.set(scenes[sceneIndex][index], {
        direction: item.direction,
      });
    });
  }

  document.querySelector(".js-cycle").addEventListener("click", rollLabels);
</script>
</body>
</html>
