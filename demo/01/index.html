<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>1. slot-textのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <link href="https://esm.sh/slot-text@0.3.1/style.css" rel="stylesheet" />
  <style>
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;

      @media (width <= 560px) {
        grid-template-columns: 1fr;
      }
    }

    .signal-card {
      display: grid;
      place-items: center;
      min-height: 112px;
      padding: 16px;

      &:nth-child(1) {
        background: var(--soft-blue);
      }

      &:nth-child(3) {
        background: var(--soft-purple);
      }

      @media (width <= 560px) {
        min-height: 104px;
      }
    }

    .slot-label {
      min-height: 40px;
      font-weight: bold;
      line-height: 1.3;
    }

    .slot-stack {
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    .slot-label-en {
      font-size: 30px;

      @media (width <= 560px) {
        font-size: 26px;
      }
    }

    .slot-label-ja {
      font-size: 20px;
      color: var(--primary);

      @media (width <= 560px) {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
<main class="wrapper">
  <section class="signal-grid">
    <div class="panel signal-card">
      <div class="slot-stack">
        <p class="slot-label slot-label-en mono js-copy-label-en">Copy</p>
        <p class="slot-label slot-label-ja js-copy-label-ja">コピー</p>
      </div>
    </div>

    <div class="panel signal-card">
      <div class="slot-stack">
        <p class="slot-label slot-label-en mono js-status-label-en">Online</p>
        <p class="slot-label slot-label-ja js-status-label-ja">オンライン</p>
      </div>
    </div>

    <div class="panel signal-card">
      <div class="slot-stack">
        <p class="slot-label slot-label-en mono js-save-label-en">Saving</p>
        <p class="slot-label slot-label-ja js-save-label-ja">保存中</p>
      </div>
    </div>
  </section>

  <div class="control-row">
    <button class="control-button js-cycle" type="button">Change</button>
  </div>
</main>

<script type="module">
  import { slotText } from "https://esm.sh/slot-text@0.3.1";

  const scenes = [
    ["Copy", "コピー", "Online", "オンライン", "Saving", "保存中"],
    ["Copied", "コピー済み", "Offline", "オフライン", "Done", "完了"],
  ];

  const targets = [
    { selector: ".js-copy-label-en", direction: "up" },
    { selector: ".js-copy-label-ja", direction: "up" },
    { selector: ".js-status-label-en", direction: "down" },
    { selector: ".js-status-label-ja", direction: "down" },
    { selector: ".js-save-label-en", direction: "up" },
    { selector: ".js-save-label-ja", direction: "up" },
  ];

  const items = targets.map((target, index) => ({
    // 初期表示の文字列を渡して、対象要素用のcontrollerを作成する
    controller: slotText(document.querySelector(target.selector), scenes[0][index]),
    direction: target.direction,
  }));

  let sceneIndex = 0;

  function rollLabels() {
    sceneIndex = (sceneIndex + 1) % scenes.length;

    items.forEach((item, index) => {
      // set()に次の文字列を渡すと、スロット風に切り替わる
      item.controller.set(scenes[sceneIndex][index], {
        direction: item.direction,
      });
    });
  }

  document.querySelector(".js-cycle").addEventListener("click", rollLabels);
</script>
</body>
</html>
