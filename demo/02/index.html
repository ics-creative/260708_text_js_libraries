<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>2. NumberFlowのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;

      @media (max-width: 560px) {
        grid-template-columns: 1fr;
      }
    }

    .metric-card {
      display: grid;
      place-items: center;
      min-height: 132px;
      padding: 16px;

      &:nth-child(1) {
        background: var(--soft-blue);
      }

      &:nth-child(3) {
        background: var(--soft-purple);
      }
    }

    number-flow {
      width: fit-content;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 2.45rem;
      font-weight: 850;
      line-height: 1.05;
      color: var(--ink);

      @media (max-width: 560px) {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
<main class="wrapper">
  <section class="metric-grid">
    <div class="panel metric-card">
      <number-flow class="js-flow"></number-flow>
    </div>

    <div class="panel metric-card">
      <number-flow class="js-flow"></number-flow>
    </div>

    <div class="panel metric-card">
      <number-flow class="js-flow"></number-flow>
    </div>

    <div class="panel metric-card">
      <number-flow class="js-flow"></number-flow>
    </div>
  </section>

  <div class="control-row">
    <button class="control-button js-update" type="button">Update</button>
  </div>
</main>

<script type="module">
  import { continuous } from "https://esm.sh/number-flow@0.6.0";

  const flows = [...document.querySelectorAll(".js-flow")];

  const metricSets = [
    [12480, 7, 86000, 88],
    [13950, 4, 92000, 104],
    [13520, 9, 104000, 127],
  ];

  let metricIndex = 0;

  flows.forEach((flow, index) => {
    if (index === 2) {
      flow.format = { style: "currency", currency: "JPY", maximumFractionDigits: 0 };
    } else {
      flow.format = { maximumFractionDigits: 0 };
    }

    // 表示形式やロケール、動きのプラグインを要素へ設定する
    flow.locales = "ja-JP";
    flow.plugins = [continuous];

    // update()に数値を渡すと、差分がアニメーションする
    flow.update(metricSets[metricIndex][index]);
  });

  function updateMetrics() {
    metricIndex = (metricIndex + 1) % metricSets.length;

    flows.forEach((flow, index) => {
      flow.update(metricSets[metricIndex][index]);
    });
  }

  document.querySelector(".js-update").addEventListener("click", updateMetrics);
</script>
</body>
</html>
