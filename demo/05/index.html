<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>5. Fittyのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .fit-panel {
      display: grid;
      gap: 16px;
      min-width: 0;
      padding: 22px;
      background: var(--soft-blue);
    }

    .fit-stage {
      display: grid;
      justify-items: center;
      min-width: 0;
      min-height: 200px;
      align-items: center;
      padding: 18px;
      border-radius: 8px;
      background: #ffffff;
    }

    .fit-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(var(--fit-width, 280px), 100%);
      max-width: 100%;
      min-height: 128px;
      padding: 14px;
      border-radius: 8px;
      background: var(--soft-purple);
      overflow: hidden;
    }

    .fit-title {
      display: inline-block;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 120px;
      font-weight: 900;
      line-height: 0.95;
      text-align: center;
      color: var(--ink);

      @media (max-width: 560px) {
        font-size: 96px;
      }
    }

    .fit-inner {
      display: flex;
      justify-content: center;
      width: 100%;
      min-width: 0;
    }

    .fit-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      justify-content: center;
      margin-bottom: 4px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .width-range {
      width: 100%;
      accent-color: var(--primary);
    }
  </style>
</head>

<body>
<main class="wrapper">
  <section class="panel fit-panel">
    <div class="fit-stage">
      <div class="fit-frame js-fit-frame">
        <div class="fit-inner">
          <p class="fit-title js-fit-title">RESPONSIVE HEADLINE LAYOUT</p>
        </div>
      </div>
    </div>

    <div>
      <p class="fit-stats">
        <span>container: <span class="js-container-size">0</span>px</span>
        <span>font-size: <span class="js-font-size">0</span>px</span>
      </p>
      <input class="width-range js-width-range" max="380" min="150" type="range" value="280" />
    </div>

    <div class="control-row">
      <button class="mini-button js-copy-button" data-copy="SALE" type="button">short</button>
      <button class="mini-button js-copy-button" data-copy="EVENT SCHEDULE" type="button">middle</button>
      <button class="mini-button js-copy-button" data-copy="RESPONSIVE HEADLINE LAYOUT" type="button">long</button>
    </div>
  </section>
</main>

<script type="module">
  import fitty from "https://esm.sh/fitty@2.4.2";

  const frame = document.querySelector(".js-fit-frame");
  const title = document.querySelector(".js-fit-title");
  const range = document.querySelector(".js-width-range");
  const containerSize = document.querySelector(".js-container-size");
  const fontSize = document.querySelector(".js-font-size");
  const buttons = [...document.querySelectorAll(".js-copy-button")];

  // 対象テキストと、調整するフォントサイズの範囲を指定する
  const fittedTitle = fitty(title, {
    minSize: 10,
    maxSize: 220,
  });

  function fitToCurrentFrame() {
    frame.style.setProperty("--fit-width", `${range.value}px`);

    // 親要素の幅を変えた場合は、fit()で再計算する
    fittedTitle.fit({ sync: true });
  }

  function updateStats() {
    containerSize.textContent = title.parentElement.clientWidth;
    fontSize.textContent = Math.round(Number.parseFloat(getComputedStyle(title).fontSize));
  }

  range.addEventListener("input", fitToCurrentFrame);
  title.addEventListener("fit", updateStats);

  buttons.forEach((button) => {
    button.addEventListener("click", () => {
      title.textContent = button.dataset.copy;
    });
  });

  fitToCurrentFrame();
</script>
</body>
</html>
